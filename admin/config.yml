backend:
  name: github
  repo: supernihil/supernihil.github.io

# This line should *not* be present in production.
# But for development, it allows editing locally.
local_backend: true

publish_mode: editorial_workflow

media_folder: "assets/screenshots"
public_folder: "/assets/screenshots"

collections:
  - name: "blog" # Used in routes, e.g., /admin/collections/blog
    label: "Blog" # Used in the UI
    folder: "_posts" # The path to the folder where the documents are stored
    create: true # Allow users to create new documents in this collection
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}" # Filename template, e.g., YYYY-MM-DD-title.md
    fields: # The fields for each document, usually in front matter
      - {label: "Layout", name: "layout", widget: "hidden", default: "post"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Title (English)", name: "title_en", widget: "string", required: false}
      - {label: "Publish Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false}
      - label: "Category (Danish)"
        name: "category"
        widget: "select"
        options: 
          - { label: "Video", value: "video" }
          - { label: "Performance", value: "performance" }
          - { label: "Kode", value: "kode" }
          - { label: "Web", value: "web" }
          - { label: "Installation", value: "installation" }
          - { label: "Talk", value: "talk" }
          - { label: "Tegneserie", value: "tegneserie" }
          - { label: "Koncept", value: "koncept" }
      - label: "Category (English)"
        name: "category_en"
        widget: "select"
        options: 
          - { label: "Video", value: "video" }
          - { label: "Performance", value: "performance" }
          - { label: "Code", value: "code" }
          - { label: "Web", value: "web" }
          - { label: "Installation", value: "installation" }
          - { label: "Talk", value: "talk" }
          - { label: "Comic", value: "comic" }
          - { label: "Concept", value: "concept" }
      - label: "Type"
        name: "type"
        widget: "select"
        options: ["static", "live"]
        default: "static"
      - {label: "Cover Image", name: "cover", widget: "image", required: false}
      - {label: "Video URL", name: "video_url", widget: "string", required: false, hint: "YouTube, Vimeo or direct video link"}
      - label: "Links"
        name: "links"
        widget: "list"
        fields:
          - label: "Type"
            name: "label"
            widget: "select"
            options: 
              - { label: "Website", value: "website" }
              - { label: "Video", value: "video" }
              - { label: "Repository (GitHub/Code)", value: "repo" }
              - { label: "Event", value: "event" }
              - { label: "Article", value: "article" }
          - {label: "URL", name: "url", widget: "string"}
      - {label: "Body", name: "body", widget: "markdown"}
      - {label: "Body (English)", name: "body_en", widget: "markdown", required: false}
