---
layout: default
---
<div class="works-grid">
  {% assign sorted_posts = site.posts | sort: "date" | reverse %}
  {% for post in sorted_posts %}
    <div class="work-item">
      <a href="{{ post.url | relative_url }}">
        {% if post.thumbnail %}
          <img src="{{ post.thumbnail | relative_url }}" alt="{{ post.title }}" loading="lazy" width="300">
        {% elsif post.cover %}
          <img src="{{ post.cover | relative_url }}" alt="{{ post.title }}" loading="lazy" width="300">
        {% endif %}
        <div class="work-info">
          <span class="work-title">
            <span class="lang-da">{{ post.title }}</span>
            <span class="lang-en">{{ post.title_en | default: post.title }}</span>
          </span>
          <span class="work-date">{{ post.date | date: "%Y" }}</span>
        </div>
      </a>
    </div>
  {% endfor %}
</div>
